name: Run Python Code
on: [push]
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install dependencies
        run: pip install -r requirements.txt
      - name: Run script
        run: python main.py
